name: Build and Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the packaged files to GitHub Release
        type: boolean
        default: false
      release_tag:
        description: Release tag; defaults to v + package.json version
        type: string
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Windows installer
        run: npm run electron:build -- --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiliMusic-Windows-x64
          path: |
            release/BiliMusic-Setup-*-x64.exe
            release/BiliMusic-Setup-*-x64.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: BiliMusic-Windows-x64
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: BiliMusic ${{ steps.release.outputs.tag }}
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.release.outputs.tag, 'alpha') || contains(steps.release.outputs.tag, 'beta') || contains(steps.release.outputs.tag, 'rc') }}
          files: release-assets/**
